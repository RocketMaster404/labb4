                        Lägg till länk

                <div class="boxes">
                    <h3>Väder</h3>
                    <div class="boxInBox weatherBox">
                        <h3 class="weather-headerLine">Idag</h3>
                        <div class="weather">
                            <img id="weather-img-today" alt="Väderikon" />
                            <p id="temp-today">Temeratur</p>
                        </div>
                    </div>
                    <div class="boxInBox weatherBox">
                        <h3 class="weather-headerLine">Imorgon</h3>
                        <div class="weather">
                            <img id="weather-img-tomorrow" alt="Väderikon" />
                            <p id="temp-tomorrow">Temeratur</p>
                        </div>
                    </div>
                    <div class="boxInBox weatherBox">
                        <h3 class="weather-headerLine">Övermorgon</h3>
                        <div class="weather">
                            <img id="weather-img-thirdDay" alt="Väderikon" />
                            <p id="temp-third">Temeratur</p>
                        </div>
                    </div>
                </div>
                <div class="boxes" id="pokemon-box">
                    <h3 id="score">Score: 0</h3>
                    <h3>Vem är!</h3>

                    <img id="pokemon-img" />

                    <input
                        type="text"
                        id="pokemon-input"
                        placeholder="Skriv din gissning"
                        class="glass-input"
                    />

                    <button id="guess-btn" class="glass-btn">Gissa</button>

                    <p id="result-note"></p>
                </div>
                <div class="boxes">
                    <h3>Anteckningar</h3>
                    <textarea name="" id="notes" class="glass-input"></textarea>
                </div>
            </div>
        </section>
        <section id="pop-up">
            <p>Ange Rubrik</p>
            <input
                type="text"
                placeholder="Rubrik.."
                id="input-link-headline"
            />
            <p>Ange Länk</p>
            <input type="text" placeholder="Länk.." id="input-link" />
            <button id="link-added">Lägg till</button>
        </section>
        <footer>
            <button id="new-bg" class="glass-btn">Slumpa ny Bakgrund</button>
            <!-- <button id="clear-storage" class="glass-btn">Reset</button> -->
        </footer>
